<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/contact.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
  <title>Contact</title>
</head>

<body>
  <div id="navbar"></div>
  <div class="area">
    <div class="formulaire">
      <form action="https://api.web3forms.com/submit" method="POST">

        <input type="hidden" name="access_key" value="5355c523-fe8d-49d4-a9a6-f7b93390b436">

        <input type="hidden" name="from_name" value="Portfolio BTS">

        <h1>Contactez-moi</h1>
        <div class="separation"></div>
        <div class="corps-formulaire">
          <div class="gauche">
            <div class="groupe">
              <label>Votre Prénom</label>
              <input type="text" name="First Name" autocomplete="off" required/>
              <i class="bi bi-person-fill"></i>
            </div>
            <div class="groupe">
              <label>Votre Nom</label>
              <input type="text" name="name" autocomplete="off" required/>
              <i class="bi bi-person"></i>
            </div>
            <div class="groupe">
              <label>Votre adresse e-mail</label>
              <input type="email" name="email" autocomplete="off" required/>
              <i class="bi bi-envelope-fill"></i>
            </div>
            <div class="groupe">
              <label>Le sujet de votre mail</label>
              <input type="text" name="subject" autocomplete="off" />
              <i class="bi bi-card-text"></i>
            </div>
          </div>

          <div class="droite">
            <div class="groupe">
              <label>Message </label>
              <textarea name="message" placeholder="Saisissez ici..."></textarea>
            </div>
          </div>
        </div>

        <div class="pied-formulaire" align="center">
          <button type="submit">Envoyer le message</button>
        </div>
      </form>
    </div>
  </div>
  <script src="components-loader.js"></script>
</body>
<div id="footer"></div>
</html>
